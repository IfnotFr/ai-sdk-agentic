name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build Packages (ai-sdk-agentic & ai-sdk-office-server)
        run: npm run build

      - name: Run Tests (ai-sdk-agentic Core)
        run: npm test -w ai-sdk-agentic
        
      - name: Lint workspace
        run: npm run lint --workspaces --if-present
